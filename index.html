<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <link rel="stylesheet" href="src/assets/scss/main.scss">
</head>

<body>
    <div class="chat-container">
        <aside class="chat-sidebar">
            <header class="chat-sidebar__header">
                <form class="chat-sidebar__search" role="search">
                    <input type="text" class="chat-sidebar__search-input" placeholder="Search chats...">
                </form>
            </header>

            <nav class="chat-sidebar__nav" aria-label="Chat List">
                <ul class="chat-list">
                    <li class="chat-list__item chat-list__item--active">
                        <span class="chat-list__item-name">Chat 1</span>
                        <span class="chat-list__item-time">19:48</span>
                    </li>
                    <li class="chat-list__item">
                        <span class="chat-list__item-name">Chat 2</span>
                        <span class="chat-list__item-time">18:30</span>
                    </li>
                </ul>
            </nav>
        </aside>
        <main class="chat-main">
            <header class="chat-main__header">
                <div class="chat-main__recipient">
                    <img src="src/assets/images/avatar1.png" alt="Icon">
                    <div class="chat-main__recipient-info">
                        <span class="chat-main__recipient-name">Чат 1</span>
                        <span class="chat-main__recipient-status">В сети 5 мин назад</span>
                    </div>
                </div>
                <div class="chat-main__actions">
                    <button class="chat-main__action-button">
                        <img src="src/assets/icons/search-icon.svg" alt="Search">
                    </button>
                    <button class="chat-main__action-button">
                        <img src="src/assets/icons/call-icon.svg" alt="Call">
                    </button>
                    <button class="chat-main__action-button">
                        <img src="src/assets/icons/more-icon.svg" alt="More Options">
                    </button>
                </div>
            </header>
            <section class="chat-messages" aria-live="polite">
                <div class="chat-messages__spacer"></div>
                <div class="chat-messages__date">
                    <span>Сегодня</span>
                </div>

                    <p>Привет как дела!</p>
                    <div class="message__status">
                        <time datetime="2024-09-20T18:12">18:12</time>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4.95834 9.67517L2.74575 7.46258C2.63574 7.35632 2.48838 7.29753 2.33544 7.29886C2.18249 7.30019 2.03618 7.36153 1.92803 7.46969C1.81987 7.57784 1.75852 7.72415 1.75719 7.8771C1.75586 8.03005 1.81466 8.1774 1.92092 8.28742L4.54592 10.9124C4.65531 11.0218 4.80366 11.0832 4.95834 11.0832C5.11302 11.0832 5.26136 11.0218 5.37075 10.9124L11.7874 4.49575C11.8937 4.38573 11.9525 4.23838 11.9511 4.08543C11.9498 3.93248 11.8885 3.78618 11.7803 3.67802C11.6722 3.56987 11.5259 3.50852 11.3729 3.50719C11.22 3.50586 11.0726 3.56466 10.9626 3.67092L4.95834 9.67517Z"/>
                        </svg> 
                    </div>
                </article>
            </section>

            <footer class="chat-main__footer">
                <form class="chat-input" role="form">
                    <button class="chat-input__send-button">
                        <img src="src/assets/icons/emoji-icon.svg" alt="Icon">
                    </button>
                    <input type="text" class="chat-input__field" placeholder="Напишите сообщение">
                    <button class="chat-input__emoji-button">
                        <img src="src/assets/icons/send-icon.svg" alt="Icon">
                    </button>
                </form>
            </footer>
        </main>

    </div>
</body>

</html>
